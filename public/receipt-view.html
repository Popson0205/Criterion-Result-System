<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt — Criterion College</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f6f8; padding: 20px; color: #222; }
    .wrap { max-width: 680px; margin: 0 auto; }
    .action-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
    }
    .btn-print {
      background: #1a7a3c; color: #fff; border: none; padding: 10px 22px;
      border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-wa {
      background: #25D366; color: #fff; border: none; padding: 10px 22px;
      border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
      text-decoration: none; display: inline-block;
    }
    .receipt-card {
      background: #fff; border: 1px solid #ddd; border-radius: 10px;
      padding: 28px 32px; font-family: Arial, sans-serif;
    }
    .loading { text-align: center; padding: 60px 20px; color: #888; font-size: 15px; }
    .error   { text-align: center; padding: 60px 20px; color: #c00; font-size: 15px; }
    @media print {
      body { background: #fff; padding: 0; }
      .action-bar { display: none !important; }
      .receipt-card { border: none; border-radius: 0; padding: 10px; box-shadow: none; }
    }
    @media (max-width: 520px) {
      .receipt-card { padding: 16px; }
      body { padding: 10px; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="action-bar" id="action-bar" style="display:none;">
    <div style="font-size:13px;color:#555;">Criterion College — Cash Receipt</div>
    <div style="display:flex;gap:10px;">
      <a id="wa-btn" href="#" target="_blank" class="btn-wa">📲 WhatsApp</a>
      <button class="btn-print" onclick="window.print()">🖨️ Print / Save PDF</button>
    </div>
  </div>
  <div class="receipt-card" id="receipt-card">
    <p class="loading">Loading receipt…</p>
  </div>
</div>

<script>
  function numToWords(n) {
    const a = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine',
      'Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen',
      'Seventeen','Eighteen','Nineteen'];
    const b = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
    if (n === 0) return 'Zero';
    if (n < 0) return 'Minus ' + numToWords(-n);
    let s = '';
    if (Math.floor(n/1000000)>0){s+=numToWords(Math.floor(n/1000000))+' Million ';n%=1000000;}
    if (Math.floor(n/1000)>0)   {s+=numToWords(Math.floor(n/1000))+' Thousand ';n%=1000;}
    if (Math.floor(n/100)>0)    {s+=numToWords(Math.floor(n/100))+' Hundred ';n%=100;}
    if (n>0){s+=(s?'and ':'');s+=n<20?a[n]:b[Math.floor(n/10)]+(n%10?'-'+a[n%10]:'');}
    return s.trim();
  }
  function fmt(val) {
    return '₦' + (parseFloat(val)||0).toLocaleString('en-NG',{minimumFractionDigits:2,maximumFractionDigits:2});
  }

  async function load() {
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('receipt-card').innerHTML = '<p class="error">Invalid receipt link.</p>';
      return;
    }
    try {
      const res = await fetch('/api/receipt-public/' + token);
      if (!res.ok) {
        const err = await res.json();
        document.getElementById('receipt-card').innerHTML = `<p class="error">${err.error || 'Receipt not found.'}</p>`;
        return;
      }
      render(await res.json());
    } catch(e) {
      document.getElementById('receipt-card').innerHTML = '<p class="error">Could not load receipt. Check your connection.</p>';
    }
  }

  function render(r) {
    const total      = (r.items||[]).reduce((s,it)=>s+(parseFloat(it.amount)||0),0);
    const totalWords = numToWords(Math.floor(total)) + ' Naira Only';
    const methods    = ['Cash','Cheque','Bank Transfer','Others'];
    const selected   = (r.payment_method||'').split(',').map(m=>m.trim());
    const filled     = r.items||[];
    const blanks     = Math.max(0, 5 - filled.length);

    document.getElementById('receipt-card').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:8px;">
        <div style="width:60px;height:60px;background:linear-gradient(135deg,#1a6e3c,#55A845);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:20px;">CC</div>
        <div style="text-align:center;">
          <div style="font-size:20px;font-weight:800;color:#1a6e3c;">CRITERION COLLEGE, OSOGBO</div>
          <div style="background:#222;color:#fff;font-weight:700;font-size:13px;padding:3px 16px;border-radius:4px;display:inline-block;margin-top:4px;">08063224872</div>
        </div>
      </div>
      <div style="text-align:center;font-size:12px;text-decoration:underline;color:#333;margin-bottom:6px;">Cash Receipt</div>
      <div style="display:flex;justify-content:space-between;font-size:13px;border-bottom:1px solid #ccc;padding-bottom:8px;margin-bottom:10px;">
        <span>Receipt No: <strong style="color:#1a6e3c;">${r.receipt_number}</strong></span>
        <span>Date: <strong>${r.date||''}</strong></span>
      </div>
      <div style="font-size:13px;margin-bottom:4px;">
        Name: <span style="border-bottom:1px solid #333;display:inline-block;min-width:260px;padding-bottom:2px;"><strong>${r.studentName||''}</strong></span>
      </div>
      <div style="display:flex;gap:40px;font-size:13px;margin-bottom:12px;">
        <span>Class: <span style="border-bottom:1px solid #333;display:inline-block;min-width:100px;"><strong>${r.classId||''}</strong></span></span>
        <span>Session: <strong>${r.session||''}</strong> | Term: <strong>${r.term||''}</strong></span>
      </div>
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="background:#1a7a3c;color:#fff;">
            <th style="padding:8px 10px;text-align:center;width:42px;font-size:12px;">S/N</th>
            <th style="padding:8px 10px;text-align:left;font-size:12px;">ITEM(S)</th>
            <th style="padding:8px 10px;text-align:right;width:130px;font-size:12px;">AMOUNT (₦)</th>
          </tr>
        </thead>
        <tbody>
          ${filled.map((it,i)=>`
            <tr style="background:${i%2===0?'#d4edda':'#a8e6a3'};">
              <td style="padding:8px 10px;text-align:center;font-size:12px;border-bottom:1px solid #c3e6cb;">${i+1}</td>
              <td style="padding:8px 10px;font-size:12px;border-bottom:1px solid #c3e6cb;">${it.name}</td>
              <td style="padding:8px 10px;text-align:right;font-size:12px;border-bottom:1px solid #c3e6cb;">${fmt(it.amount)}</td>
            </tr>`).join('')}
          ${Array.from({length:blanks}).map((_,i)=>`
            <tr style="background:${(filled.length+i)%2===0?'#d4edda':'#a8e6a3'};">
              <td style="padding:8px 10px;border-bottom:1px solid #c3e6cb;">&nbsp;</td>
              <td style="padding:8px 10px;border-bottom:1px solid #c3e6cb;">&nbsp;</td>
              <td style="padding:8px 10px;border-bottom:1px solid #c3e6cb;">&nbsp;</td>
            </tr>`).join('')}
          <tr style="background:#1a7a3c;color:#fff;">
            <td colspan="2" style="padding:9px 10px;text-align:center;font-weight:700;font-size:13px;">TOTAL</td>
            <td style="padding:9px 10px;text-align:right;font-weight:700;font-size:13px;">${fmt(total)}</td>
          </tr>
        </tbody>
      </table>
      <div style="margin-top:10px;font-size:12px;color:#1a7a3c;">
        Total amount in words: <span style="border-bottom:1px solid #555;display:inline-block;min-width:300px;">${totalWords}</span>
      </div>
      <div style="margin-top:12px;display:flex;gap:22px;font-size:12px;flex-wrap:wrap;">
        ${methods.map(m=>`
          <label style="display:flex;align-items:center;gap:5px;">
            <span style="width:14px;height:14px;border:1.5px solid #333;display:inline-block;
              background:${selected.includes(m)?'#1a7a3c':'#fff'};border-radius:2px;"></span>
            ${m}
          </label>`).join('')}
      </div>
      <div style="margin-top:8px;font-size:12px;">
        To balance: <span style="border-bottom:1px solid #555;display:inline-block;min-width:200px;">
          ${r.to_balance&&parseFloat(r.to_balance)>0?fmt(r.to_balance):''}
        </span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:32px;padding-top:12px;">
        <div style="text-align:center;font-size:12px;">
          <div style="border-top:1px solid #333;width:160px;padding-top:4px;">Payer's Signature</div>
        </div>
        <div style="text-align:center;font-size:12px;">
          <div style="border-top:1px solid #333;width:160px;padding-top:4px;">${r.bursar_name||'Bursar'}</div>
        </div>
      </div>`;

    document.getElementById('action-bar').style.display = 'flex';
    const msg = encodeURIComponent(`Criterion College Receipt (${r.receipt_number}):\n${window.location.href}`);
    document.getElementById('wa-btn').href = `https://wa.me/?text=${msg}`;
    document.title = `Receipt ${r.receipt_number} — ${r.studentName||''} | Criterion College`;
  }

  load();
</script>
</body>
  </html>
