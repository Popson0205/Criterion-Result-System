services:
  - type: web
    name: criterion-college
    env: node
    nodeVersion: 20.18.0
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /opt/render/project/src/data/criterion.db
    disk:
      name: criterion-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
